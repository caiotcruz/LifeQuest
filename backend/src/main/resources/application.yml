spring:
  application:
    name: lifequest

  # ── Configuração de Conexão com o Banco de Dados (Adicionado) ──
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lifequest}
    username: ${DATABASE_USERNAME:lifequest_user}
    password: ${DATABASE_PASSWORD:lifequest_pass}
    driver-class-name: org.postgresql.Driver

  # ── Configuração de Cache e Streaks com Redis (Adicionado) ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:lifequest_redis_pass}

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway cuida do schema; Hibernate só valida
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": public
        jdbc:
          "[time_zone]": UTC

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  # ── Jackson ──────────────────────────────────────────────────
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    default-property-inclusion: NON_NULL

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── JWT ──────────────────────────────────────────────────────
lifequest:
  jwt:
    secret: ${JWT_SECRET:default_dev_secret_change_in_prod_256bits_must_be_long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}       # 24h
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7d

  # ── XP Config ────────────────────────────────────────────────
  xp:
    categories:
      HEALTH: 20
      STUDY: 25
      WORK: 30
      "[PERSONAL_DEVELOPMENT]": 20
      CREATIVITY: 15

  # ── Streak Config ─────────────────────────────────────────────
  streak:
    minimum-completion-rate: 0.60   # 60% das tarefas do dia
    max-recovery-per-month: 2

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    root: WARN
    "[com.lifequest]": INFO
    "[org.springframework.security]": WARN